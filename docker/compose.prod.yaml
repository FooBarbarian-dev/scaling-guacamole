# Production Docker Compose override
# Usage: docker compose -f docker/compose.yaml -f docker/compose.prod.yaml up -d --build
services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - staticfiles:/app/staticfiles
    environment:
      - DJANGO_ENV=production
    command: ["bash", "docker/scripts/entrypoint.sh"]

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles:/usr/share/nginx/static:ro
    depends_on:
      - web

  temporal-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      - DJANGO_ENV=production
    command: ["python", "src/myproject/manage.py", "start_temporalio_worker", "main"]

  # No temporalio-ui in production (access via VPN or authenticated proxy if needed)
  temporalio-ui:
    profiles:
      - debug

volumes:
  staticfiles:
