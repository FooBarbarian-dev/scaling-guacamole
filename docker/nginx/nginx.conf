upstream django {
    server web:8000;
}

server {
    listen 80;
    server_name _;  # TODO: Replace with your domain

    # Gzip compression
    gzip on;
    gzip_types text/html application/json text/css application/javascript;
    gzip_min_length 256;

    # Static files served directly from the shared volume
    location /static/ {
        alias /usr/share/nginx/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";

        # CORS headers for static assets
        # TODO: Replace * with your domain
        add_header Access-Control-Allow-Origin *;
    }

    # Favicon and logo shortcuts
    location = /favicon.ico {
        alias /usr/share/nginx/static/img/favicon.ico;
        expires 30d;
        access_log off;
    }

    location = /logo.svg {
        alias /usr/share/nginx/static/img/logo.svg;
        expires 30d;
        access_log off;
    }

    # Proxy all other requests to Django
    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS headers on proxied responses
        # TODO: Replace with your allowed origin
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-CSRFToken" always;
        add_header Access-Control-Allow-Credentials "true" always;

        # Handle preflight requests
        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
}
